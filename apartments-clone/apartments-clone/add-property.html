<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add a Property - Apartments.com Clone">
    <title>Add a Property | Apartments.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: var(--gray-light);
        }
        .simple-header {
            justify-content: center; /* Center logo for focused form experience */
        }
        .simple-header .nav-links, .simple-header .auth-buttons {
            display: none; /* Hide navigation during form fill */
        }
    </style>
</head>
<body>
    <!-- Simplified Header -->
    <header class="site-header">
        <div class="header-container simple-header">
            <div class="logo-section">
                <a href="index.html" class="logo-link">
                    <div class="logo-icon"><i class="fa-solid fa-house-chimney"></i></div>
                    <span>Apartments.com</span>
                </a>
            </div>
        </div>
    </header>

    <main class="add-property-main">
        <div class="form-container">
            <div class="form-header text-center">
                <h1>Add a Property</h1>
                <p>Welcome! Let's get your property listed and find your next renter.</p>
            </div>

            <!-- Custom Progress Indicator -->
            <div class="step-indicator">
                <div class="step active">
                    <div class="step-circle">1</div>
                    <div class="step-label">Address</div>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">2</div>
                    <div class="step-label">Details</div>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">3</div>
                    <div class="step-label">Photos</div>
                </div>
            </div>

            <!-- Form Card -->
            <div class="form-card">
                <form id="addPropertyForm" onsubmit="event.preventDefault(); alert('Property Submitted! (Clone Demo)'); window.location.href='rental-manager.html';">
                    
                    <div class="form-section">
                        <h2>Where is your property located?</h2>
                        
                        <div class="form-group">
                            <label for="streetAddress">Street Address *</label>
                            <input type="text" id="streetAddress" class="form-input" placeholder="e.g. 123 Main St" required>
                        </div>

                        <div class="form-group">
                            <label for="unitNumber">Unit or Apt Number (Optional)</label>
                            <input type="text" id="unitNumber" class="form-input" placeholder="e.g. Apt 4B">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City *</label>
                                <input type="text" id="city" class="form-input" placeholder="e.g. Chicago" required>
                            </div>
                            <div class="form-group">
                                <label for="state">State *</label>
                                <select id="state" class="form-input" required>
                                    <option value="" disabled selected>Select State</option>
                                    <option value="CA">California</option>
                                    <option value="IL">Illinois</option>
                                    <option value="NY">New York</option>
                                    <option value="TX">Texas</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="zipCode">ZIP Code *</label>
                                <input type="text" id="zipCode" class="form-input" placeholder="e.g. 60601" required pattern="\d{5}">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Property Type</h2>
                        <div class="property-type-selector">
                            <label class="type-card">
                                <input type="radio" name="propertyType" value="apartment" checked>
                                <div class="type-content">
                                    <i class="fa-regular fa-building"></i>
                                    <span>Apartment / Condo</span>
                                </div>
                            </label>
                            <label class="type-card">
                                <input type="radio" name="propertyType" value="house">
                                <div class="type-content">
                                    <i class="fa-solid fa-house"></i>
                                    <span>Single Family Home</span>
                                </div>
                            </label>
                            <label class="type-card">
                                <input type="radio" name="propertyType" value="townhome">
                                <div class="type-content">
                                    <i class="fa-solid fa-city"></i>
                                    <span>Townhome</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <hr class="form-divider">

                    <div class="form-actions form-row">
                        <button type="button" class="btn btn-outline" onclick="window.history.back()">Cancel</button>
                        <button type="submit" class="btn btn-primary" style="flex: 1;">Next Step</button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <!-- Simplified Footer -->
    <footer class="site-footer" style="margin-top: auto;">
        <div class="footer-container" style="justify-content: center; text-align: center;">
            <p style="color: var(--gray-text); font-size: 14px;">&copy; 2024 Apartments.com Clone. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
